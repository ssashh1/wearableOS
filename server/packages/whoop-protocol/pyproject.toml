[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "whoop-protocol"
version = "0.1.0"
description = "Shared WHOOP 4.0 BLE frame decoder (schema-as-data)."
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8"]

[tool.setuptools]
packages = ["whoop_protocol"]

[tool.setuptools.package-data]
whoop_protocol = ["schema/*.json"]

[tool.pytest.ini_options]
testpaths = ["tests"]
